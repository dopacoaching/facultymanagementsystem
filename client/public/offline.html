<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline — DOPA FMS</title>
  <style>
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f1f5f9; color: #0f172a;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; padding: 1.5rem; text-align: center;
    }
    .card {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 1rem;
      padding: 2.5rem 2rem; max-width: 380px;
      box-shadow: 0 4px 12px rgba(0,0,0,.08);
    }
    img { width: 72px; height: 72px; margin-bottom: 1rem; }
    h1 { font-size: 1.25rem; margin: 0 0 .5rem; }
    p { color: #64748b; font-size: .9rem; margin: 0 0 1.5rem; line-height: 1.5; }
    button {
      background: #4f46e5; color: #fff; border: none; border-radius: .625rem;
      padding: .7rem 1.5rem; font-size: .9375rem; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #3730a3; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/icons/icon-192.png" alt="DOPA FMS">
    <h1>You're offline</h1>
    <p>DOPA FMS needs an internet connection to load live data. Check your connection and try again.</p>
    <button onclick="location.reload()">↻ Retry</button>
  </div>
</body>
</html>
