services:
  - type: web
    name: dopa-fms-api
    env: node
    region: singapore   # closest to Kerala
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false        # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false        # set to your Netlify URL
      - key: PORT
        value: 10000       # Render assigns PORT automatically; this is a fallback
